# nginx.conf — Proxy reverso para Lambda Analytics Dashboard

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de body para uploads
    client_max_body_size 20M;

    # Archivos estáticos servidos directamente por nginx (sin pasar por Django)
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API y admin → proxy al contenedor Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para endpoints de reportes
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check del load balancer
    location /health/ {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
